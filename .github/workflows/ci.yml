name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build & Test ────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup training data
        run: |
          chmod +x setup_data.sh retrain.sh
          ./setup_data.sh

      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build all binaries
        run: cargo build --release --bins

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spam-labeler-binaries
          path: |
            target/release/spam-labeler
            target/release/eval
            target/release/export_model
            target/release/keyword_intent_test
            target/release/generate_report

  # ── Release ──────────────────────────────────────────────────────
  release:
    name: Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup training data
        run: |
          chmod +x setup_data.sh retrain.sh
          ./setup_data.sh

      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release --bins

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/release/spam-labeler dist/
          cp target/release/eval dist/
          cp target/release/export_model dist/
          cp target/release/keyword_intent_test dist/
          cp target/release/generate_report dist/
          cp retrain.sh setup_data.sh dist/
          cp README.md dist/
          tar czf spam-labeler-linux-x86_64.tar.gz -C dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: spam-labeler-linux-x86_64.tar.gz
          generate_release_notes: true
